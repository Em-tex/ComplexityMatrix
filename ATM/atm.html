<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kompleksitetsmatrise - ATM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/stil.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <a href="../index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Tilbake</a>
                <h1>ATM Kompleksitetsmatrise</h1>
            </div>
            
            <div class="score-container">
                <div class="score-circle">
                    <svg>
                        <circle cx="70" cy="70" r="60"></circle>
                        <circle id="score-progress" cx="70" cy="70" r="60"></circle>
                    </svg>
                    <div class="score-text">
                        <span id="total-score">0</span>
                        <small>Poeng</small>
                    </div>
                </div>
                <div class="complexity-label">Kompleksitet: <span id="complexity-level">-</span></div>
            </div>
        </header>

        <form id="complexity-form">
            <section class="form-section">
                <h2><i class="fa-solid fa-Layer-group"></i> Group A: Scope & Operational Environment</h2>
                <div class="question-grid">
                    <div class="question">
                        <label>A1. Types of Services Provided</label>
                        <select name="A1">
                            <option value="1">Kun én tjeneste (f.eks. MET/AFIS) (1)</option>
                            <option value="4">2-3 tjenester (ATS, CNS) (4)</option>
                            <option value="8">Omfattende (ATS, CNS, AIS, MET, DAT) (8)</option>
                        </select>
                    </div>
                    <div class="question">
                        <label>A2. ATS Provision Level</label>
                        <select name="A2">
                            <option value="1">Ingen ATS (1)</option>
                            <option value="3">Kun AFIS (3)</option>
                            <option value="6">TWR og/eller APP (6)</option>
                            <option value="10">ACC / Area Control (10)</option>
                        </select>
                    </div>
                    <div class="question">
                        <label>A3. Traffic Volume (Movements)</label>
                        <select name="A3">
                            <option value="1">Under 10 000 (1)</option>
                            <option value="3">10 000 - 50 000 (3)</option>
                            <option value="5">50 000 - 150 000 (5)</option>
                            <option value="8">Over 150 000 (8)</option>
                        </select>
                    </div>
                    <div class="question">
                        <label>A4. Traffic Mix & Airspace</label>
                        <select name="A4">
                            <option value="1">Hovedsakelig ukontrollert/VFR (1)</option>
                            <option value="4">Standard IFR/VFR mix (4)</option>
                            <option value="7">Kompleks TMA eller mye offshore helikopter (7)</option>
                            <option value="10">Kompleks cross-border / sivil-militær integrasjon (10)</option>
                        </select>
                    </div>
                    <div class="question">
                        <label>A5. Geographic Spread</label>
                        <select name="A5">
                            <option value="1">1 lokasjon (1)</option>
                            <option value="3">2-5 lokasjoner (3)</option>
                            <option value="5">6-15 lokasjoner (5)</option>
                            <option value="10">Landsdekkende / >15 lokasjoner (10)</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="form-section">
                <h2><i class="fa-solid fa-users-gear"></i> Group B: Organizational Complexity</h2>
                <div class="question-grid">
                    <div class="question">
                        <label>B1. Personnel (ATCO/ATSEP/MET)</label>
                        <select name="B1">
                            <option value="1">Under 20 ansatte (1)</option>
                            <option value="3">20 - 100 ansatte (3)</option>
                            <option value="5">100 - 300 ansatte (5)</option>
                            <option value="8">Over 300 ansatte (8)</option>
                        </select>
                    </div>
                    <div class="question">
                        <label>B2. Subcontracting & Dependencies</label>
                        <select name="B2">
                            <option value="1">Alt drives internt (1)</option>
                            <option value="3">Kjøper kun støttetjenester (3)</option>
                            <option value="8">Kritiske ATM-systemer/data utkontraktert (8)</option>
                        </select>
                    </div>
                    <div class="question">
                        <label>B3. Interfaces & Coordination (LoAs)</label>
                        <select name="B3">
                            <option value="1">Få lokale avtaler (1)</option>
                            <option value="4">Nasjonal samhandling (4)</option>
                            <option value="8">Omfattende internasjonale/grensekryssende avtaler (8)</option>
                        </select>
                    </div>
                    <div class="question">
                        <label>B4. Rostering & Fatigue Management</label>
                        <select name="B4">
                            <option value="1">Kun dagtid (1)</option>
                            <option value="4">24/7 drift men lav natt-trafikk (4)</option>
                            <option value="8">Kompleks 24/7 med hyppig sektor-kombinering (8)</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="form-section">
                <h2><i class="fa-solid fa-microchip"></i> Group C: Technology & Infrastructure</h2>
                <div class="question-grid">
                    <div class="question">
                        <label>C1. CNS System Automation</label>
                        <select name="C1">
                            <option value="2">Konvensjonell radio/radar (papirstrips) (2)</option>
                            <option value="5">Delvis automasjon (elektroniske strips, STCA) (5)</option>
                            <option value="10">Høyt automatisert (iTEC, AMAN/DMAN) (10)</option>
                        </select>
                    </div>
                    <div class="question">
                        <label>C2. Network & Cybersecurity (Part-IS)</label>
                        <select name="C2">
                            <option value="2">Lukkede/isolerte systemer (2)</option>
                            <option value="5">Nasjonalt ATM-intranett (5)</option>
                            <option value="9">SWIM-integrasjon og eksponerte IP-nettverk (9)</option>
                        </select>
                    </div>
                    <div class="question">
                        <label>C3. Remote Tower Operations</label>
                        <select name="C3">
                            <option value="1">Ingen (1)</option>
                            <option value="3">Enkeltstående RTC (3)</option>
                            <option value="6">RTC med inntil 5 lufthavner (6)</option>
                            <option value="10">Storskala RTC med multi-mode (10)</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="form-section">
                <h2><i class="fa-solid fa-triangle-exclamation"></i> Group D: Management of Change & Contingency</h2>
                <div class="question-grid">
                    <div class="question">
                        <label>D1. Management of Change (MoC)</label>
                        <select name="D1">
                            <option value="1">Ingen eller kun rutinemessige endringer (1)</option>
                            <option value="4">Flere pågående, isolerte funksjonelle endringer (4)</option>
                            <option value="9">Omfattende systembytte eller omorganisering (9)</option>
                        </select>
                    </div>
                    <div class="question">
                        <label>D2. Contingency & Resilience</label>
                        <select name="D2">
                            <option value="2">Enkle lokale beredskapsplaner (2)</option>
                            <option value="5">Full maskinvare-redundans lokalt (5)</option>
                            <option value="9">Geografisk separert C-ACC (9)</option>
                        </select>
                    </div>
                </div>
            </section>

            <div class="action-buttons">
                <button type="button" id="download-csv-button"><i class="fa-solid fa-file-csv"></i> Last ned CSV</button>
                <button type="button" id="print-pdf-button"><i class="fa-solid fa-file-pdf"></i> PDF</button>
                <button type="button" id="clear-form-button"><i class="fa-solid fa-rotate-left"></i> Nullstill</button>
            </div>
        </form>
    </div>
    <script src="js/kalkulator.js"></script>
</body>
</html>
