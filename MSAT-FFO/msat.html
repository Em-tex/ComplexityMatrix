<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management System Assessment Tool (MSAT-FFO)</title>
    <link rel="icon" href="../smallLogo.png" type="image/png">
    
    <link rel="stylesheet" href="../css/stilark.css">
    <link rel="stylesheet" href="css/style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <a href="../index.html" class="home-button" aria-label="Gå til hovedsiden">
        <i class="fa-solid fa-house"></i>
    </a>
    <div class="header">
        <h1>Management System Assessment Tool (MSAT-FFO)</h1>
        <div class="header-info">
            <div class="info-field">
                <label for="organisation-name">Name of Organisation:</label>
                <input type="text" id="organisation-name" placeholder="Enter organisation name" autocomplete="off">
            </div>
            <div class="info-field">
                <label for="organisation-type">Organisation type:</label>
                <input type="text" id="organisation-type" placeholder="Select or type" list="org-types-list">
                <datalist id="org-types-list"></datalist>
            </div>
            <div class="info-field">
                <label for="assessed-by">Assessed by:</label>
                <input type="text" id="assessed-by" placeholder="Enter name">
            </div>
            <div class="info-field">
                <label for="assessment-date">Date of assessment:</label>
                <input type="date" id="assessment-date">
            </div>
             <div class="info-field">
                <label for="empic-id">Empic ID:</label>
                <input type="text" id="empic-id" placeholder="Enter ID">
            </div>
        </div>
    </div>

    <div class="total-summary" id="total-summary-block">
        <div class="all-gauges-container">
            <div class="small-gauges-wrapper">
                <div class="four-gauges-grid">
                    <div class="gauge-block" id="gauge-block-policy"><div class="gauge-block-title"><i class="fa-solid fa-file-signature gauge-icon"></i> Safety Policy</div><div class="gauge-block-summary">Avg score: <span id="policy-avg">0.0</span></div><div class="gauge"><div class="gauge-bg"><div class="gauge-cover"></div></div><div class="gauge-needle" id="policy-needle"></div></div></div>
                    <div class="gauge-block" id="gauge-block-risk"><div class="gauge-block-title"><i class="fa-solid fa-triangle-exclamation gauge-icon"></i> Risk Assessment</div><div class="gauge-block-summary">Avg score: <span id="risk-avg">0.0</span></div><div class="gauge"><div class="gauge-bg"><div class="gauge-cover"></div></div><div class="gauge-needle" id="risk-needle"></div></div></div>
                    <div class="gauge-block" id="gauge-block-assurance"><div class="gauge-block-title"><i class="fa-solid fa-shield-halved gauge-icon"></i> Safety Assurance</div><div class="gauge-block-summary">Avg score: <span id="assurance-avg">0.0</span></div><div class="gauge"><div class="gauge-bg"><div class="gauge-cover"></div></div><div class="gauge-needle" id="assurance-needle"></div></div></div>
                    <div class="gauge-block" id="gauge-block-promotion"><div class="gauge-block-title"><i class="fa-solid fa-bullhorn gauge-icon"></i> Safety Promotion</div><div class="gauge-block-summary">Avg score: <span id="promotion-avg">0.0</span></div><div class="gauge"><div class="gauge-bg"><div class="gauge-cover"></div></div><div class="gauge-needle" id="promotion-needle"></div></div></div>
                </div>
                <div class="side-gauge-container">
                     <div class="gauge-block" id="gauge-block-additional"><div class="gauge-block-title"><i class="fa-solid fa-puzzle-piece gauge-icon"></i> Additional Items</div><div class="gauge-block-summary">Avg score: <span id="additional-avg">0.0</span></div><div class="gauge"><div class="gauge-bg"><div class="gauge-cover"></div></div><div class="gauge-needle" id="additional-needle"></div></div></div>
                </div>
            </div>
            
            <div class="gauge-block large-gauge" id="gauge-block-total"><div class="gauge-block-title">Total Average Score</div><div class="gauge-block-summary"><span id="total-gauge-avg-text">0.0</span> / 7.0</div><div class="gauge"><div class="gauge-bg"><div class="gauge-cover"></div></div><div class="gauge-needle" id="total-needle"></div></div></div>
            <div class="extension-block" id="extension-block-container"><div class="extension-block-title">Oversight Cycle Extension</div><div id="extension-checklist"></div><div class="extension-block-comment" id="extension-final-comment"></div></div>
        </div>
    </div>

    <div class="container" id="main-container">
    </div>

    <div class="multi-comments-section">
        <h2>Comments</h2>
        <div class="comments-grid">
            <div class="comment-field">
                <label for="comments-compliance">Compliance <i class="fa-solid fa-circle-info comment-help-icon" data-field="compliance"></i></label>
                <textarea id="comments-compliance" rows="4"></textarea>
            </div>
            <div class="comment-field">
                <label for="comments-flightops">Flight Operations <i class="fa-solid fa-circle-info comment-help-icon" data-field="flightops"></i></label>
                <textarea id="comments-flightops" rows="4"></textarea>
            </div>
            <div class="comment-field">
                <label for="comments-safety">Safety Department <i class="fa-solid fa-circle-info comment-help-icon" data-field="safety"></i></label>
                <textarea id="comments-safety" rows="4"></textarea>
            </div>
            <div class="comment-field">
                <label for="comments-training">Training <i class="fa-solid fa-circle-info comment-help-icon" data-field="training"></i></label>
                <textarea id="comments-training" rows="4"></textarea>
            </div>
            <div class="comment-field">
                <label for="comments-planning">Planning & FTL <i class="fa-solid fa-circle-info comment-help-icon" data-field="planning"></i></label>
                <textarea id="comments-planning" rows="4"></textarea>
            </div>
            <div class="comment-field">
                <label for="comments-reporting">Reporting <i class="fa-solid fa-circle-info comment-help-icon" data-field="reporting"></i></label>
                <textarea id="comments-reporting" rows="4"></textarea>
            </div>
            <div class="comment-field comment-field-full">
                <label for="comments-other">Other <i class="fa-solid fa-circle-info comment-help-icon" data-field="other"></i></label>
                <textarea id="comments-other" rows="4"></textarea>
            </div>
        </div>
    </div>

    <div id="action-buttons-container"></div>
    
    <div id="footer-links-container" 
         data-is-msat="true"
         data-sharepoint-url="https://caano.sharepoint.com/:f:/r/teams/CAA-MSAT/Delte%20dokumenter/Organisation%20Assessment/FFO/FFO-MSAT?csf=1&web=1&e=y7vZ2l"
         data-list-url="https://caano.sharepoint.com/:l:/r/teams/CAA-MSAT/Lists/MSAT?e=2rAM1r">
    </div>
    
    <div id="details-popup"></div>

    <script src="../js/felles_knapper.js"></script>
    <script src="js/calculator.js"></script>
</body>
</html>
